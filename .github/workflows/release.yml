name: Build & Release

on:
  push:
    branches: [main]
    paths: ['app/build.gradle.kts']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-key.jks

      - name: Configure signing from secrets
        run: |
          # Override signing config to use secrets
          cat > app/signing.properties <<EOF
          storeFile=release-key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Patch build.gradle.kts for CI signing
        run: |
          sed -i 's|storeFile = file("bili-release-key.jks")|storeFile = file("release-key.jks")|' app/build.gradle.kts
          sed -i 's|storePassword = "makoto"|storePassword = System.getenv("KEYSTORE_PASSWORD") ?: "makoto"|' app/build.gradle.kts
          sed -i 's|keyAlias = "bili"|keyAlias = System.getenv("KEY_ALIAS") ?: "bili"|' app/build.gradle.kts
          sed -i 's|keyPassword = "makoto"|keyPassword = System.getenv("KEY_PASSWORD") ?: "makoto"|' app/build.gradle.kts

      - name: Build release APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Collect and rename APKs
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          mkdir -p release-apks

          for apk in app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk")
            if echo "$filename" | grep -q "universal"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-universal.apk"
            elif echo "$filename" | grep -q "arm64"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-arm64-v8a.apk"
            elif echo "$filename" | grep -q "armeabi"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-armeabi-v7a.apk"
            elif echo "$filename" | grep -q "x86_64"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-x86_64.apk"
            elif echo "$filename" | grep -q "x86"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-x86.apk"
            fi
          done

          ls -la release-apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release-apks/*.apk
          retention-days: 5

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: release-apks

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" -20)
          else
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi

          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: BiliDownloader v${{ needs.get-version.outputs.version }}
          body: |
            ## BiliDownloader v${{ needs.get-version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Downloads

            | Architecture | Download |
            |---|---|
            | Universal (all architectures) | `BiliDownloader-v${{ needs.get-version.outputs.version }}-universal.apk` |
            | ARM64 (most modern phones) | `BiliDownloader-v${{ needs.get-version.outputs.version }}-arm64-v8a.apk` |
            | ARM32 (older phones) | `BiliDownloader-v${{ needs.get-version.outputs.version }}-armeabi-v7a.apk` |
            | x86_64 (emulators/tablets) | `BiliDownloader-v${{ needs.get-version.outputs.version }}-x86_64.apk` |
            | x86 (older emulators) | `BiliDownloader-v${{ needs.get-version.outputs.version }}-x86.apk` |

            > **Tip**: Most users should download the **ARM64** version. If unsure, use the **Universal** version.
          files: release-apks/*.apk
          draft: false
          prerelease: false
