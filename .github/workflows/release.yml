name: Build & Release

on:
  push:
    branches: [main]
    paths: ['app/build.gradle.kts']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-key.jks

      - name: Configure signing from secrets
        run: |
          # Override signing config to use secrets
          cat > app/signing.properties <<EOF
          storeFile=release-key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Patch build.gradle.kts for CI signing
        run: |
          sed -i 's|storeFile = file("bili-release-key.jks")|storeFile = file("release-key.jks")|' app/build.gradle.kts
          sed -i 's|storePassword = "makoto"|storePassword = System.getenv("KEYSTORE_PASSWORD") ?: "makoto"|' app/build.gradle.kts
          sed -i 's|keyAlias = "bili"|keyAlias = System.getenv("KEY_ALIAS") ?: "bili"|' app/build.gradle.kts
          sed -i 's|keyPassword = "makoto"|keyPassword = System.getenv("KEY_PASSWORD") ?: "makoto"|' app/build.gradle.kts

      - name: Build release APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Collect and rename APKs
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          mkdir -p release-apks

          for apk in app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk")
            if echo "$filename" | grep -q "universal"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-universal.apk"
            elif echo "$filename" | grep -q "arm64"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-arm64-v8a.apk"
            elif echo "$filename" | grep -q "armeabi"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-armeabi-v7a.apk"
            elif echo "$filename" | grep -q "x86_64"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-x86_64.apk"
            elif echo "$filename" | grep -q "x86"; then
              cp "$apk" "release-apks/BiliDownloader-v${VERSION}-x86.apk"
            fi
          done

          ls -la release-apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release-apks/*.apk
          retention-days: 5

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: release-apks

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ needs.get-version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RAW_LOGS=$(git log --pretty=format:"%s (%h)" -20)
          else
            RAW_LOGS=$(git log --pretty=format:"%s (%h)" "${PREV_TAG}..HEAD")
          fi

          CHANGES=""
          while IFS= read -r line; do
            clean=$(echo "$line" | sed 's/^```[[:space:]]*//' | sed 's/```$//')
            if [ -n "$clean" ]; then
              CHANGES="${CHANGES}- ${clean}"$'\n'
            fi
          done <<< "$RAW_LOGS"

          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: BiliDownloader v${{ needs.get-version.outputs.version }}
          body: |
            ## BiliDownloader v${{ needs.get-version.outputs.version }}

            ### 更新日志

            ${{ steps.changelog.outputs.changes }}

            ---

            ### 📦 下载

            | 下载 | 说明 |
            |:----:|:-----|
            | [![Universal](https://img.shields.io/badge/Android-Universal-3DDC84?style=for-the-badge&logo=android&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/BiliDownloader-v${{ needs.get-version.outputs.version }}-universal.apk) | 通用版（所有架构） |
            | [![ARM64](https://img.shields.io/badge/Android-ARM64-3DDC84?style=for-the-badge&logo=android&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/BiliDownloader-v${{ needs.get-version.outputs.version }}-arm64-v8a.apk) | ARM64（大多数新手机） |
            | [![ARMv7](https://img.shields.io/badge/Android-ARMv7-3DDC84?style=for-the-badge&logo=android&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/BiliDownloader-v${{ needs.get-version.outputs.version }}-armeabi-v7a.apk) | ARMv7（旧手机） |
            | [![x86_64](https://img.shields.io/badge/Android-x86__64-3DDC84?style=for-the-badge&logo=android&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/BiliDownloader-v${{ needs.get-version.outputs.version }}-x86_64.apk) | x86_64（模拟器/平板） |
            | [![x86](https://img.shields.io/badge/Android-x86-3DDC84?style=for-the-badge&logo=android&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/v${{ needs.get-version.outputs.version }}/BiliDownloader-v${{ needs.get-version.outputs.version }}-x86.apk) | x86（旧模拟器） |

            ---

            > 💡 **提示**：大多数用户请下载 **ARM64** 版本。如果不确定设备架构，请下载 **Universal** 版本。
          files: release-apks/*.apk
          draft: false
          prerelease: false